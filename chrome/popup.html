<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      width: 100%;
      min-width: 250px;
      padding: 15px;
      box-sizing: border-box;
      font-family: sans-serif;
      margin: 0;
      background-color: #14181c;
      /* Letterboxd dark background */
      color: #99aabb;
    }

    .header-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    h3 {
      margin: 0;
      color: #fff;
      font-size: 16px;
    }

    #settingsBtn {
      background: none;
      border: none;
      color: #99aabb;
      font-size: 18px;
      cursor: pointer;
      padding: 0;
      width: auto;
    }

    #settingsBtn:hover {
      color: #fff;
    }

    input {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #445566;
      border-radius: 3px;
      background: #2c3440;
      color: #fff;
      font-size: 14px;
      margin-bottom: 10px;
    }

    input:focus {
      outline: none;
      border-color: #00e054;
      /* Letterboxd green */
    }

    button {
      width: 100%;
      padding: 8px;
      background-color: #00e054;
      color: #fff;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background-color: #00c04b;
    }
  </style>
</head>

<body>
  <div class="header-container">
    <h3 id="popupTitle">Letterboxd Arama</h3>
    <button id="settingsBtn" title="Ayarlar">⚙️</button>
  </div>
  <input type="text" id="searchInput" placeholder="Film adı yazın..." autofocus>
  <button id="searchBtn">Ara</button>
  <script src="popup.js"></script>
</body>

</html>
